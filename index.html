<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1A1D2E" />
  <link rel="manifest" href="manifest.json" />
  <title>Состояние</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; }
    body { background: #1A1D2E; font-family: 'Inter', system-ui, sans-serif; }
    input[type="range"] { -webkit-appearance: none; background: transparent; }
    input[type="range"]::-webkit-slider-runnable-track { height: 4px; background: #363A57; border-radius: 2px; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #A78BFA; margin-top: -7px; cursor: pointer; }
    input[type="range"]::-moz-range-track { height: 4px; background: #363A57; border-radius: 2px; }
    input[type="range"]::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: #A78BFA; border: none; cursor: pointer; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + ReactDOM (UMD) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <!-- Babel Standalone -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.0/babel.min.js"></script>

  <script type="text/babel">
    // ── Деструктуризация хуков из глобального React ──────────────────────
    const { useState, useEffect, useRef, useCallback } = React;

    // ── STORAGE ──────────────────────────────────────────────────────────────
    const LS = {
      get: (k, def) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; } },
      set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
    };
    const KEYS = { log: 'st_log_v1', breath: 'st_breath_v1', sleep: 'st_sleep_v1', sleepState: 'st_sleepstate_v1' };

    // ── UTILS ──────────────────────────────────────────────────────────────
    const pad = n => String(n).padStart(2, '0');
    const todayStr = () => { const d = new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
    const fmtTime = d => { if (typeof d === 'string') d = new Date(d); return `${pad(d.getHours())}:${pad(d.getMinutes())}`; };
    const fmtDate = str => { if (!str) return ''; const [,m,d] = str.split('-'); return `${d}.${m}`; };
    const fmtDur = min => { const h = Math.floor(min/60), m = min%60; return m > 0 ? `${h}ч ${m}м` : `${h}ч`; };
    const daysAgo = n => { const d = new Date(); d.setDate(d.getDate()-n+1); d.setHours(0,0,0,0); return d; };
    const DAYS_RU = ['вс','пн','вт','ср','чт','пт','сб'];
    const MONTHS_RU = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];

    // ── COLORS ──────────────────────────────────────────────────────────────
    const C = { anxiety:'#60C6C6', irritation:'#F6C26A', depression:'#F07D7D', accent:'#A78BFA', green:'#6EE7B7', bg:'#1A1D2E', bg2:'#222538', bg3:'#2A2E47', border:'#363A57', text:'#E2E4F0', muted:'#7B7FA8' };
    const EMOTION_KEYS = ['anxiety','irritation','depression'];
    const EMOTION_LABELS = { anxiety:'Тревога', irritation:'Раздражение', depression:'Подавленность' };
    const EMOTION_COLORS = { anxiety: C.anxiety, irritation: C.irritation, depression: C.depression };

    // ── MINI LINE CHART ────────────────────────────────────────────────────
    function LineChart({ data, visible, days }) {
      if (!data.length) return null;
      const W = 340, H = 160, PAD = { t:8, r:8, b:28, l:28 };
      const iW = W - PAD.l - PAD.r, iH = H - PAD.t - PAD.b;
      const xScale = i => PAD.l + (i / (data.length - 1 || 1)) * iW;
      const yScale = v => PAD.t + iH - ((v - 0) / 10) * iH;

      const lines = EMOTION_KEYS.filter(k => visible[k]).map(k => {
        const pts = data.map((e,i) => `${xScale(i)},${yScale(e[k])}`).join(' ');
        return <polyline key={k} points={pts} fill="none" stroke={EMOTION_COLORS[k]} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" opacity="0.9"/>;
      });

      const dots = EMOTION_KEYS.filter(k => visible[k]).flatMap(k =>
        data.length <= 24 ? data.map((e,i) => (
          <circle key={k+i} cx={xScale(i)} cy={yScale(e[k])} r="3" fill={EMOTION_COLORS[k]}/>
        )) : []
      );

      const step = Math.max(1, Math.ceil(data.length / 8));
      const xLabels = data.map((e,i) => {
        if (i % step !== 0 && i !== data.length-1) return null;
        const d = new Date(e.ts);
        const lbl = days === 1 ? `${pad(d.getHours())}h` : `${fmtDate(e.date)}`;
        return <text key={i} x={xScale(i)} y={H-6} textAnchor="middle" fill={C.muted} fontSize="9">{lbl}</text>;
      });

      const yLines = [0,2,4,6,8,10].map(v => (
        <g key={v}>
          <line x1={PAD.l} y1={yScale(v)} x2={W-PAD.r} y2={yScale(v)} stroke={C.border} strokeWidth="1"/>
          <text x={PAD.l-4} y={yScale(v)+3} textAnchor="end" fill={C.muted} fontSize="9">{v}</text>
        </g>
      ));

      return (
        <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto',display:'block'}}>
          {yLines}{lines}{dots}{xLabels}
        </svg>
      );
    }

    function BarChart({ data }) {
      if (!data.length) return null;
      const W = 340, H = 120, PAD = { t:8, r:8, b:28, l:28 };
      const iW = W - PAD.l - PAD.r, iH = H - PAD.t - PAD.b;
      const maxH = Math.max(10, ...data.map(d => d.h));
      const barW = Math.max(6, iW / data.length - 4);
      const xScale = i => PAD.l + (i + 0.5) * (iW / data.length);
      const yScale = v => PAD.t + iH - (v / maxH) * iH;

      const bars = data.map((d,i) => {
        const color = d.h >= 7 ? C.accent : d.h >= 6 ? C.green : C.depression;
        const bh = (d.h / maxH) * iH;
        return (
          <g key={i}>
            <rect x={xScale(i)-barW/2} y={yScale(d.h)} width={barW} height={Math.max(2,bh)} fill={color} opacity="0.75" rx="3"/>
            <text x={xScale(i)} y={H-6} textAnchor="middle" fill={C.muted} fontSize="9">{d.label}</text>
          </g>
        );
      });

      const yLines = [0, Math.round(maxH/2), maxH].map(v => (
        <g key={v}>
          <line x1={PAD.l} y1={yScale(v)} x2={W-PAD.r} y2={yScale(v)} stroke={C.border} strokeWidth="1"/>
          <text x={PAD.l-4} y={yScale(v)+3} textAnchor="end" fill={C.muted} fontSize="9">{v}</text>
        </g>
      ));

      return (
        <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%',height:'auto',display:'block'}}>
          {yLines}{bars}
        </svg>
      );
    }

    // ── BREATHING ANIMATION ────────────────────────────────────────────────
    const PHASES = [
      { name:'Вдох',   dur:3, scale:1.35, color: C.accent },
      { name:'Пауза',  dur:3, scale:1.35, color: C.green },
      { name:'Выдох',  dur:3, scale:0.7,  color: C.anxiety },
      { name:'Пауза',  dur:3, scale:0.7,  color: C.muted },
    ];
    const TOTAL_CYCLES = 15;

    // ── MAIN APP ──────────────────────────────────────────────────────────────
    function App() {
      const [tab, setTab] = useState('log');
      const [toast, setToast] = useState(null);

      const [emotionLog, setEmotionLog] = useState(() => LS.get(KEYS.log, []));
      const [sliders, setSliders] = useState({ anxiety:5, irritation:5, depression:5 });

      const [period, setPeriod] = useState(1);
      const [visible, setVisible] = useState({ anxiety:true, irritation:true, depression:true });

      const [sleepLog, setSleepLog] = useState(() => LS.get(KEYS.sleep, []));
      const [sleepState, setSleepState_] = useState(() => LS.get(KEYS.sleepState, { sleeping:false, sleepTs:null }));
      const setSleepState = s => { LS.set(KEYS.sleepState, s); setSleepState_(s); };

      const [breathSessions, setBreathSessions] = useState(() => LS.get(KEYS.breath, []));
      const [breathRunning, setBreathRunning] = useState(false);
      const [breathPhase, setBreathPhase] = useState(0);
      const [breathTick, setBreathTick] = useState(0);
      const [breathCycle, setBreathCycle] = useState(0);
      const breathRef = useRef(null);

      const [showRemind, setShowRemind] = useState(false);
      const [showDataManagement, setShowDataManagement] = useState(false);
      // ── НОВОЕ СОСТОЯНИЕ ДЛЯ ПОДТВЕРЖДЕНИЯ ──
      const [confirmAction, setConfirmAction] = useState(null);

      const [now, setNow] = useState(new Date());
      useEffect(() => { const t = setInterval(() => setNow(new Date()), 10000); return () => clearInterval(t); }, []);

      useEffect(() => LS.set(KEYS.log, emotionLog), [emotionLog]);
      useEffect(() => LS.set(KEYS.breath, breathSessions), [breathSessions]);
      useEffect(() => LS.set(KEYS.sleep, sleepLog), [sleepLog]);

      const showToast = useCallback((msg, err) => {
        setToast({ msg, err });
        setTimeout(() => setToast(null), 2500);
      }, []);

      // ── EMOTION LOG ────────────────────────────────────────────────────
      const thisHourKey = `${todayStr()}-${pad(now.getHours())}`;
      const alreadyLogged = emotionLog.some(e => e.hourKey === thisHourKey);

      const saveEmotion = () => {
        const ts = new Date();
        const hourKey = `${todayStr()}-${pad(ts.getHours())}`;
        setEmotionLog(prev => [...prev.filter(e => e.hourKey !== hourKey), {
          ts: ts.toISOString(), hourKey, date: todayStr(), hour: ts.getHours(),
          anxiety: sliders.anxiety, irritation: sliders.irritation, depression: sliders.depression
        }]);
        showToast('✓ Записано');
      };

      // ── DATA MANAGEMENT ─────────────────────────────────────────────────
      // Функции удаления теперь не закрывают модал и не вызывают тост сами,
      // они только меняют состояние. Всё делается через подтверждение.

      const performDeleteLastEmotion = () => {
        if (emotionLog.length === 0) {
          showToast('Нет записей для удаления', true);
          return;
        }
        const sorted = [...emotionLog].sort((a, b) => new Date(b.ts) - new Date(a.ts));
        const last = sorted[0];
        setEmotionLog(prev => prev.filter(e => e.ts !== last.ts));
        showToast('Последняя запись удалена');
      };

      const performDeleteEmotionsSince = (hours) => {
        const cutoff = new Date(Date.now() - hours * 3600000);
        const toRemove = emotionLog.filter(e => new Date(e.ts) >= cutoff);
        if (toRemove.length === 0) {
          showToast(`Нет записей за последние ${hours} ч`, true);
          return;
        }
        setEmotionLog(prev => prev.filter(e => new Date(e.ts) < cutoff));
        showToast(`Удалено ${toRemove.length} записей за последние ${hours} ч`);
      };

      const performResetAll = () => {
        Object.values(KEYS).forEach(k => { try { localStorage.removeItem(k); } catch {} });
        setEmotionLog([]);
        setSleepLog([]);
        setBreathSessions([]);
        setSleepState({ sleeping: false, sleepTs: null });
        setSliders({ anxiety: 5, irritation: 5, depression: 5 });
        showToast('Все данные удалены');
      };

      const performDeleteLastSleep = () => {
        if (sleepLog.length === 0) {
          showToast('Нет записей о сне для удаления', true);
          return;
        }
        const sorted = [...sleepLog].sort((a, b) => new Date(b.wakeTs || b.sleepTs) - new Date(a.wakeTs || a.sleepTs));
        const last = sorted[0];
        setSleepLog(prev => prev.filter(e => e !== last));
        showToast('Последняя запись о сне удалена');
      };

      // Обёртки для вызова с подтверждением
      const requestConfirm = (message, actionFn) => {
        setConfirmAction({
          message,
          onConfirm: () => {
            actionFn();
            setConfirmAction(null);
            setShowDataManagement(false);
          }
        });
      };

      // ── SLEEP ──────────────────────────────────────────────────────────
      const goToSleep = () => { setSleepState({ sleeping:true, sleepTs: new Date().toISOString() }); showToast('Спокойной ночи 🌙'); };
      const wakeUp = () => {
        if (!sleepState.sleepTs) return;
        const wakeTs = new Date();
        const durationMin = Math.round((wakeTs - new Date(sleepState.sleepTs)) / 60000);
        const entry = { sleepTs: sleepState.sleepTs, wakeTs: wakeTs.toISOString(), durationMin, wakeDate: todayStr() };
        const next = [...sleepLog, entry];
        setSleepLog(next);
        setSleepState({ sleeping:false, sleepTs:null });
        showToast(`Доброе утро ☀️ — сон ${fmtDur(durationMin)}`);
      };

      // ── BREATHING ─────────────────────────────────────────────────────
      useEffect(() => {
        if (!breathRunning) return;
        breathRef.current = setInterval(() => {
          setBreathTick(t => {
            const ph = PHASES[breathPhase];
            if (t + 1 >= ph.dur) {
              const nextPh = (breathPhase + 1) % 4;
              setBreathPhase(nextPh);
              if (nextPh === 0) {
                setBreathCycle(c => {
                  if (c + 1 >= TOTAL_CYCLES) {
                    clearInterval(breathRef.current);
                    setBreathRunning(false);
                    const ts = new Date();
                    setBreathSessions(prev => [...prev, { date: todayStr(), time: fmtTime(ts), ts: ts.toISOString() }]);
                    showToast('🎉 Сессия завершена — 3 минуты');
                    return 0;
                  }
                  return c + 1;
                });
              }
              return 0;
            }
            return t + 1;
          });
        }, 1000);
        return () => clearInterval(breathRef.current);
      }, [breathRunning, breathPhase]);

      const startBreath = () => { setBreathPhase(0); setBreathTick(0); setBreathCycle(0); setBreathRunning(true); };
      const stopBreath = () => { clearInterval(breathRef.current); setBreathRunning(false); setBreathPhase(0); setBreathTick(0); setBreathCycle(0); };

      const ph = PHASES[breathPhase];
      const ballScale = breathRunning ? ph.scale : 1;
      const circleR = 88;
      const circumference = 2 * Math.PI * circleR;
      const progress = breathRunning ? breathTick / ph.dur : 0;
      const strokeOffset = circumference * (1 - progress);

      // ── CHART DATA ─────────────────────────────────────────────────────
      const since = daysAgo(period);
      const filteredLog = emotionLog.filter(e => new Date(e.ts) >= since).sort((a,b) => a.ts.localeCompare(b.ts));
      const avg = key => filteredLog.length ? (filteredLog.reduce((s,e) => s+e[key],0)/filteredLog.length).toFixed(1) : '—';

      const filteredSleep = sleepLog.filter(e => new Date(e.wakeTs) >= since);
      const sleepBarData = filteredSleep.map(e => ({
        h: +(e.durationMin/60).toFixed(1),
        label: fmtDate(e.wakeDate || e.wakeTs?.slice(0,10) || '')
      }));
      const avgSleep = filteredSleep.length ? (filteredSleep.reduce((a,s) => a+s.durationMin,0)/filteredSleep.length/60).toFixed(1) : '—';
      const minSleep = filteredSleep.length ? Math.min(...filteredSleep.map(s => s.durationMin/60)).toFixed(1) : '—';
      const maxSleep = filteredSleep.length ? Math.max(...filteredSleep.map(s => s.durationMin/60)).toFixed(1) : '—';

      // ── DOWNLOAD REPORT ───────────────────────────────────────────────
      const downloadReport = () => {
        const pLabel = period===1?'сегодня':period===3?'3дня':period===7?'неделя':'месяц';
        let csv = '\uFEFF';
        csv += `Отчёт за: ${pLabel}\nСформирован: ${new Date().toLocaleString('ru')}\n\n`;
        csv += '=== ЭМОЦИИ ===\nДата,Время,Тревога,Раздражение,Подавленность\n';
        filteredLog.forEach(e => { const d=new Date(e.ts); csv+=`${fmtDate(e.date)},${fmtTime(d)},${e.anxiety},${e.irritation},${e.depression}\n`; });
        if (filteredLog.length) csv += `\nСредние,,${avg('anxiety')},${avg('irritation')},${avg('depression')}\n`;
        csv += '\n=== СОН ===\nДата,Засыпание,Пробуждение,Часов\n';
        filteredSleep.forEach(s => { csv+=`${fmtDate(s.wakeDate||'')},${fmtTime(s.sleepTs)},${fmtTime(s.wakeTs)},${(s.durationMin/60).toFixed(1)}\n`; });
        csv += '\n=== ДЫХАНИЕ ===\nДата,Время\n';
        breathSessions.filter(s=>new Date(s.ts||s.date)>=since).forEach(s=>{ csv+=`${s.date},${s.time}\n`; });
        const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
        const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
        a.download=`sostoyanie_${todayStr()}_${pLabel}.csv`; document.body.appendChild(a); a.click(); document.body.removeChild(a);
        showToast('Отчёт скачан');
      };

      // ── NOTIFICATIONS ─────────────────────────────────────────────────
      const enableNotif = async () => {
        if (typeof Notification === 'undefined') { showToast('Уведомления недоступны', true); return; }
        const r = await Notification.requestPermission();
        if (r === 'granted') showToast('Уведомления включены'); else showToast('Не разрешено', true);
      };

      // ── TODAY BREATH ──────────────────────────────────────────────────
      const todayBreath = breathSessions.filter(s => s.date === todayStr());
      const recentSleep = [...sleepLog].reverse().slice(0,3);

      // ── STYLES ────────────────────────────────────────────────────────
      const s = {
        app: { background: C.bg, color: C.text, fontFamily:"'Inter',system-ui,sans-serif", minHeight:'100vh', maxWidth:480, margin:'0 auto', position:'relative', paddingBottom:80 },
        screen: { padding:'24px 20px' },
        h1: { fontSize:22, fontWeight:700, margin:'0 0 4px' },
        label: { fontSize:11, letterSpacing:'0.08em', textTransform:'uppercase', color:C.muted, margin:'0 0 16px', display:'block' },
        card: { background:C.bg2, border:`1px solid ${C.border}`, borderRadius:14, padding:18, marginBottom:14 },
        btnPrimary: { width:'100%', padding:'14px 0', background:C.accent, color:'#fff', fontSize:15, fontWeight:600, border:'none', borderRadius:14, cursor:'pointer', display:'block', marginBottom:10 },
        btnGhost: { width:'100%', padding:'13px 0', background:'none', color:C.muted, fontSize:14, border:`1px solid ${C.border}`, borderRadius:14, cursor:'pointer', display:'block', marginBottom:10 },
        statusBar: { display:'flex', alignItems:'center', gap:8, padding:'10px 14px', background:C.bg3, borderRadius:10, marginBottom:20, fontSize:13, color:C.muted },
        nav: { position:'fixed', bottom:0, left:'50%', transform:'translateX(-50%)', width:'100%', maxWidth:480, background:C.bg2, borderTop:`1px solid ${C.border}`, display:'flex', zIndex:100 },
        navBtn: (active) => ({ flex:1, padding:'12px 8px 16px', background:'none', border:'none', color: active?C.accent:C.muted, fontSize:11, cursor:'pointer', display:'flex', flexDirection:'column', alignItems:'center', gap:4 }),
        sliderWrap: { marginBottom:24 },
        sliderRow: { display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 },
        emotionName: (color) => ({ fontSize:15, fontWeight:500, color }),
        emotionVal: (color) => ({ fontSize:28, fontWeight:700, color }),
        ticks: { display:'flex', justifyContent:'space-between', color:C.muted, fontSize:10, marginTop:4 },
        toggle: (on, color) => ({ display:'flex', alignItems:'center', gap:7, padding:'7px 13px 7px 10px', borderRadius:20, border:`1px solid ${on?color:C.border}`, background:on?color+'22':C.bg3, cursor:'pointer', fontSize:13, color:on?C.text:C.muted, userSelect:'none', marginBottom:0 }),
        toggleDot: (color, on) => ({ width:10, height:10, borderRadius:'50%', background:color, opacity:on?1:0.35, flexShr
